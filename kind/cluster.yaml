# kind cluster configuration for the resource-optimization demo.
#
# Single-node cluster sized for a 4-core GitHub Codespace.
# Exposes the otel-demo-light frontend on host port 8080 via extraPortMappings.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: obs-optim
nodes:
  - role: control-plane
    image: kindest/node:v1.30.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        listenAddress: "0.0.0.0"
        protocol: TCP
