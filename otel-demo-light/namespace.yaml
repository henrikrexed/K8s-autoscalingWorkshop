apiVersion: v1
kind: Namespace
metadata:
  name: otel-demo
  labels:
    name: otel-demo
    app.kubernetes.io/part-of: opentelemetry-demo-light
    # Explicit opt-OUT from Dynatrace OneAgent injection. The DynaKube's
    # oneAgent.applicationMonitoring.namespaceSelector matches `oneagent: "true"`
    # — we set "false" here so anyone reading the manifest can see this
    # namespace is deliberately observed via OTLP (the in-cluster otel-collector),
    # not via OneAgent code-module injection.
    oneagent: "false"
