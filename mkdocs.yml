site_name: K8s Autoscaling Workshop
site_description: Smart Kubernetes resource optimization with Dynatrace, OpenTelemetry, and GitHub Codespaces.
site_url: https://henrikrexed.github.io/K8s-autoscalingWorkshop/
site_author: Henrik Rexed
repo_name: henrikrexed/K8s-autoscalingWorkshop
repo_url: https://github.com/henrikrexed/K8s-autoscalingWorkshop
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - 1. Getting Started: getting-started.md
  - 2. Workshop: workshop.md
  - 3. Cleanup: cleanup.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mermaid2

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/henrikrexed/K8s-autoscalingWorkshop
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@isitobservable
  generator: false

copyright: |
  Copyright &copy; 2026 Henrik Rexed —
  <a href="#__consent">Change cookie settings</a>
